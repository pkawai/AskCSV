<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AskCSV — AI-powered CSV analyst</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <!-- Plotly via CDN for now; vendored in PR #10. -->
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
  <header>
    <div class="header-row">
      <div>
        <h1>AskCSV</h1>
        <p class="tagline">Drop a CSV. Get clean data, smart charts, and an AI analyst.</p>
      </div>
      <div id="usage-chip" class="usage-chip" title="LLM tokens used this session" hidden></div>
    </div>
  </header>
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <main id="app">
    <section id="upload-zone" class="upload-zone">
      <label for="csv-file" class="drop-label">
        <strong>Upload a CSV</strong>
        <span class="hint">Drag a file here or click to choose</span>
        <input id="csv-file" type="file" accept=".csv" hidden>
      </label>
      <div id="upload-status" class="upload-status" hidden></div>
    </section>

    <section id="overview" class="card" hidden>
      <h2>Overview</h2>
      <div id="overview-stats" class="stats-grid"></div>
      <div id="cleaning-report" class="cleaning-report"></div>
    </section>

    <section id="columns-section" class="card" hidden>
      <h2>Columns</h2>
      <div id="columns-grid" class="columns-grid"></div>
    </section>

    <section id="missing-section" class="card" hidden>
      <h2>Missing values</h2>
      <div id="missing-chart"></div>
    </section>

    <section id="correlation-section" class="card" hidden>
      <h2>Correlation matrix</h2>
      <div id="correlation-chart"></div>
    </section>

    <section id="suggested-section" class="card" hidden>
      <h2>Suggested charts</h2>
      <div id="suggested-grid" class="suggested-grid"></div>
    </section>

    <section id="chat-section" class="card" hidden>
      <div class="card-head">
        <h2>Ask the analyst</h2>
        <a id="export-link" class="export-link" href="#" target="_blank" rel="noopener">Export report ↗</a>
      </div>
      <div id="ai-suggestions" class="ai-suggestions"></div>
      <form id="chat-form" class="chat-form" autocomplete="off">
        <input
          id="chat-input"
          type="text"
          placeholder="e.g. average revenue by region for orders over $500"
          required
        >
        <button type="submit">Ask</button>
      </form>
      <div id="chat-thread" class="chat-thread"></div>
    </section>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
